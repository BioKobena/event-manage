<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">CM</div>
      <div class="login-copy">
        <p class="login-eyebrow">Accès sécurisé</p>
        <h1>Concert Manager</h1>
        <p>Connectez-vous pour administrer les concerts ou réserver vos places depuis votre espace utilisateur.</p>
      </div>
    </div>

    <div class="login-tabs" role="tablist" aria-label="Type de connexion">
      <button
        type="button"
        class="tab-button"
        [ngClass]="{ active: loginType === 'admin', inactive: loginType !== 'admin' }"
        (click)="setLoginType('admin')"
      >
        Admin
      </button>
      <button
        type="button"
        class="tab-button"
        [ngClass]="{ active: loginType === 'user', inactive: loginType !== 'user' }"
        (click)="setLoginType('user')"
      >
        Utilisateur
      </button>
    </div>

    <div *ngIf="loginType === 'admin'">
      <form (ngSubmit)="loginAsAdmin()">
        <div class="form-group">
          <label class="form-label">Nom d'utilisateur</label>
          <input class="form-input" type="text" name="username" [(ngModel)]="adminUsername" required />
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input class="form-input" type="password" name="password" [(ngModel)]="adminPassword" required />
        </div>
        <button class="submit-button" type="submit">Se connecter</button>
      </form>
      <p class="demo-hint">Compte de démonstration: admin / admin</p>
    </div>

    <div *ngIf="loginType === 'user'">
      <form (ngSubmit)="loginAsUser()">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" name="email" [(ngModel)]="userEmail" required />
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input class="form-input" type="password" name="password" [(ngModel)]="userPassword" required />
        </div>
        <button class="submit-button" type="submit">Se connecter</button>
      </form>
      <p class="demo-hint">Pour la version courante, saisissez un email valide pour créer ou retrouver votre compte.</p>
    </div>

    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
  </div>
</div>
